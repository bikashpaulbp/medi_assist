name: medi_assist
description: A comprehensive health reminder app - Medicine, Meal, Medical Records & Activity reminders.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management & Storage
  get: ^4.6.6
  get_storage: ^2.1.1

  # Notifications
  flutter_local_notifications: ^19.5.0
  timezone: ^0.10.1

  # Alarm (plays sound, vibrates, works even if app is killed)
  alarm: ^5.1.3

  # Background / Foreground Service (24/7 running service)
  flutter_foreground_task: ^8.14.0

  # Permissions
  permission_handler: ^12.0.1

  # UI Helpers
  flutter_slidable: ^3.1.1
  intl: ^0.20.2
  cupertino_icons: ^1.0.8


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
   
    - assets/audio/
    - assets/images/